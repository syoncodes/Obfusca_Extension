<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obfusca</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      width: 320px;
      padding: 16px;
      background: #000000;
      color: #FFFFFF;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222222;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #111111;
      border: 1px solid #222222;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 18px;
      height: 18px;
      color: #FFFFFF;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* Status section */
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #0A0A0A;
      border: 1px solid #222222;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .status-label {
      font-size: 14px;
      color: #FFFFFF;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #333333;
      transition: 0.2s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: #666666;
      transition: 0.2s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: #44FF44;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(20px);
      background-color: #FFFFFF;
    }

    /* Backend status */
    .backend-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #0A0A0A;
      border: 1px solid #222222;
      border-radius: 10px;
      font-size: 13px;
      color: #888888;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555555;
    }

    .status-dot.connected {
      background: #44FF44;
    }

    .status-dot.disconnected {
      background: #FF4444;
    }

    /* Auth section */
    .auth-section {
      padding: 14px;
      background: #0A0A0A;
      border: 1px solid #222222;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .auth-section.logged-in {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .user-email {
      font-size: 13px;
      font-weight: 500;
      color: #FFFFFF;
    }

    .user-tenant {
      font-size: 11px;
      color: #888888;
    }

    .user-plan {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888888;
      margin-top: 2px;
    }

    .plan-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .plan-badge.trialing {
      background: #FFAA0020;
      color: #FFAA00;
      border: 1px solid #FFAA0040;
    }

    .plan-badge.active {
      background: #44FF4420;
      color: #44FF44;
      border: 1px solid #44FF4440;
    }

    .plan-badge.expired {
      background: #FF444420;
      color: #FF4444;
      border: 1px solid #FF444440;
    }

    .upgrade-link {
      display: block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #111111;
      border: 1px solid #222222;
      border-radius: 8px;
      font-size: 12px;
      color: #888888;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .upgrade-link:hover {
      background: #1a1a1a;
      color: #FFFFFF;
    }

    .upgrade-link.expired {
      border-color: #FF444440;
      color: #FF4444;
    }

    .upgrade-link.expired:hover {
      background: #FF444410;
      color: #FF6666;
    }

    /* Login form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form h3 {
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 4px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      color: #888888;
    }

    .form-group input {
      padding: 10px 12px;
      background: #111111;
      border: 1px solid #222222;
      border-radius: 8px;
      font-size: 13px;
      color: #FFFFFF;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input::placeholder {
      color: #555555;
    }

    .form-group input:focus {
      border-color: #555555;
    }

    /* Buttons */
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary {
      background: #FFFFFF;
      color: #000000;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:disabled {
      background: #333333;
      color: #666666;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #111111;
      color: #FFFFFF;
      border: 1px solid #222222;
    }

    .btn-secondary:hover {
      background: #1a1a1a;
    }

    .btn-sm {
      padding: 8px 12px;
      font-size: 12px;
    }

    .btn-link {
      background: none;
      border: none;
      color: #888888;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }

    .btn-link:hover {
      color: #FFFFFF;
    }

    /* Messages */
    .message {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .message.error {
      background: #FF444420;
      color: #FF4444;
      border: 1px solid #FF444440;
    }

    .message.success {
      background: #44FF4420;
      color: #44FF44;
      border: 1px solid #44FF4440;
    }

    .hidden {
      display: none !important;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #222222;
    }

    .divider-text {
      font-size: 11px;
      color: #555555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Footer */
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #222222;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer svg {
      width: 12px;
      height: 12px;
      color: #555555;
    }

    .footer span {
      font-size: 11px;
      color: #555555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .footer a {
      color: #888888;
      text-decoration: none;
      font-size: 11px;
    }

    .footer a:hover {
      color: #FFFFFF;
    }

    /* Loading spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
